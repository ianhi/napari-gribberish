name: napari-gribberish
display_name: Gribberish
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
# categories: []
contributions:
  commands:
    - id: napari-gribberish.get_reader
      python_name: napari_gribberish._reader:napari_get_reader
      title: Open data with Gribberish
    - id: napari-gribberish.make_sample_data
      python_name: napari_gribberish._sample_data:make_sample_data
      title: Load sample data from Gribberish
    - id: napari-gribberish.make_container_widget
      python_name: napari_gribberish._widget:ImageThreshold
      title: Make threshold Container widget
    - id: napari-gribberish.make_magic_widget
      python_name: napari_gribberish._widget:threshold_magic_widget
      title: Make threshold magic widget
    - id: napari-gribberish.make_function_widget
      python_name: napari_gribberish._widget:threshold_autogenerate_widget
      title: Make threshold function widget
    - id: napari-gribberish.make_qwidget
      python_name: napari_gribberish._widget:ExampleQWidget
      title: Make example QWidget
  readers:
    - command: napari-gribberish.get_reader
      accepts_directories: false
      filename_patterns: ['*.npy']
  sample_data:
    - command: napari-gribberish.make_sample_data
      display_name: Gribberish
      key: unique_id.1
  widgets:
    - command: napari-gribberish.make_container_widget
      display_name: Container Threshold
    - command: napari-gribberish.make_magic_widget
      display_name: Magic Threshold
    - command: napari-gribberish.make_function_widget
      autogenerate: true
      display_name: Autogenerate Threshold
    - command: napari-gribberish.make_qwidget
      display_name: Example QWidget
  menus:
    napari/layers/segment:
      - command: napari-gribberish.make_container_widget
      - command: napari-gribberish.make_magic_widget
      - command: napari-gribberish.make_function_widget
      - command: napari-gribberish.make_qwidget
