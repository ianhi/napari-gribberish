name: napari-gribberish
display_name: Gribberish
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
categories: ["IO", "Utilities"]
contributions:
  commands:
    - id: napari-gribberish.get_reader
      python_name: napari_gribberish._reader:napari_get_reader
      title: Open GRIB data with Gribberish
    - id: napari-gribberish.make_sample_data
      python_name: napari_gribberish._sample_data:make_sample_data
      title: Load HRRR sample data
    - id: napari-gribberish.make_variable_selector
      python_name: napari_gribberish._widget:GribVariableSelector
      title: GRIB variable selector
  readers:
    - command: napari-gribberish.get_reader
      accepts_directories: false
      filename_patterns: ['*.grib', '*.grib2', '*.grb', '*.grb2']
  sample_data:
    - command: napari-gribberish.make_sample_data
      display_name: HRRR surface (remote)
      key: hrrr-sfc
  widgets:
    - command: napari-gribberish.make_variable_selector
      display_name: GRIB variable selector
